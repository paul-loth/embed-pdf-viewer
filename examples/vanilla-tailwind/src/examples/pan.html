<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>EmbedPDF Pan Example</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="min-h-screen bg-slate-100 p-6 text-slate-900">
  <div class="mx-auto flex max-w-7xl flex-col gap-4">
    <section class="flex flex-wrap items-center gap-2 rounded-xl border border-slate-200 bg-white p-4 shadow-sm">
      <span class="px-2 text-sm font-medium text-slate-600">Interaction Mode:</span>
      <button id="select-btn" type="button" class="rounded px-3 py-1.5 text-sm font-medium hover:bg-slate-100">
        Select Text
      </button>
      <button id="pan-btn" type="button" class="rounded px-3 py-1.5 text-sm font-medium hover:bg-slate-100">
        Pan (Hand Tool)
      </button>
      <span id="pan-status" class="text-sm text-slate-500"></span>
    </section>

    <div class="h-[700px] overflow-hidden rounded-xl border border-slate-300 bg-white shadow-lg">
      <div id="pdf-viewer" class="h-full w-full"></div>
    </div>
  </div>

  <script type="module">
    import EmbedPDF from 'https://cdn.jsdelivr.net/npm/@embedpdf/snippet/dist/embedpdf.js';

    const panStatus = document.getElementById('pan-status');

    const viewer = EmbedPDF.init({
      type: 'container',
      target: document.getElementById('pdf-viewer'),
      theme: { preference: 'system' },
      pan: {
        defaultMode: 'mobile',
      },
      documentManager: {
        initialDocuments: [
          {
            url: 'https://snippet.embedpdf.com/ebook.pdf',
            documentId: 'pan-doc',
          },
        ],
      },
    });

    const registry = await viewer.registry;
    const pan = registry.getPlugin('pan')?.provides()?.forDocument('pan-doc');

    if (!pan) {
      throw new Error('Pan plugin not available');
    }

    function renderPanMode(isPanMode) {
      panStatus.textContent = `Current mode: ${isPanMode ? 'pan' : 'select'}`;
    }

    renderPanMode(pan.isPanMode());

    pan.onPanModeChange((isPanMode) => {
      renderPanMode(isPanMode);
    });

    document.getElementById('select-btn').addEventListener('click', () => {
      pan.disablePan();
    });

    document.getElementById('pan-btn').addEventListener('click', () => {
      pan.enablePan();
    });
  </script>
</body>
</html>
