<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>EmbedPDF Spread Example</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="min-h-screen bg-slate-100 p-6 text-slate-900">
  <div class="mx-auto flex max-w-7xl flex-col gap-4">
    <section class="flex flex-wrap items-center gap-2 rounded-xl border border-slate-200 bg-white p-4 shadow-sm">
      <span class="px-2 text-sm font-medium text-slate-600">Layout Mode:</span>
      <div class="flex gap-1">
        <button id="single-page-btn" type="button" class="rounded px-3 py-1.5 text-sm font-medium hover:bg-slate-100">
          Single Page
        </button>
        <button id="odd-spread-btn" type="button" class="rounded px-3 py-1.5 text-sm font-medium hover:bg-slate-100">
          Two-Page (Odd)
        </button>
        <button id="even-spread-btn" type="button" class="rounded px-3 py-1.5 text-sm font-medium hover:bg-slate-100">
          Two-Page (Even)
        </button>
      </div>
      <span id="spread-status" class="text-sm text-slate-500"></span>
    </section>

    <div class="h-[700px] overflow-hidden rounded-xl border border-slate-300 bg-white shadow-lg">
      <div id="pdf-viewer" class="h-full w-full"></div>
    </div>
  </div>

  <script type="module">
    import EmbedPDF, { SpreadMode } from 'https://cdn.jsdelivr.net/npm/@embedpdf/snippet/dist/embedpdf.js';

    const spreadStatus = document.getElementById('spread-status');

    const viewer = EmbedPDF.init({
      type: 'container',
      target: document.getElementById('pdf-viewer'),
      theme: { preference: 'system' },
      spread: {
        defaultSpreadMode: SpreadMode.None,
      },
      documentManager: {
        initialDocuments: [
          {
            url: 'https://snippet.embedpdf.com/ebook.pdf',
            documentId: 'spread-doc',
          },
        ],
      },
    });

    const registry = await viewer.registry;
    const spread = registry.getPlugin('spread')?.provides()?.forDocument('spread-doc');

    if (!spread) {
      throw new Error('Spread plugin not available');
    }

    function renderMode(mode) {
      spreadStatus.textContent = `Current mode: ${mode}`;
    }

    renderMode(spread.getSpreadMode());

    spread.onSpreadChange((mode) => {
      renderMode(mode);
    });

    document.getElementById('single-page-btn').addEventListener('click', () => {
      spread.setSpreadMode(SpreadMode.None);
    });

    document.getElementById('odd-spread-btn').addEventListener('click', () => {
      spread.setSpreadMode(SpreadMode.Odd);
    });

    document.getElementById('even-spread-btn').addEventListener('click', () => {
      spread.setSpreadMode(SpreadMode.Even);
    });
  </script>
</body>
</html>
