<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>EmbedPDF Rotate Example</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="min-h-screen bg-slate-100 p-6 text-slate-900">
  <div class="mx-auto flex max-w-7xl flex-col gap-4">
    <section class="flex flex-wrap items-center justify-between gap-4 rounded-xl border border-slate-200 bg-white p-4 shadow-sm">
      <div class="flex items-center gap-4">
        <div class="flex items-center gap-2">
          <button
            id="rotate-left-btn"
            type="button"
            class="rounded p-2 hover:bg-slate-100"
            title="Rotate Counter-Clockwise"
          >
            Rotate Left
          </button>
          <button
            id="rotate-right-btn"
            type="button"
            class="rounded p-2 hover:bg-slate-100"
            title="Rotate Clockwise"
          >
            Rotate Right
          </button>
        </div>
        <span id="rotation-status" class="font-mono text-sm font-medium text-slate-600">
          Rotation: 0°
        </span>
      </div>
    </section>

    <div class="h-[700px] overflow-hidden rounded-xl border border-slate-300 bg-white shadow-lg">
      <div id="pdf-viewer" class="h-full w-full"></div>
    </div>
  </div>

  <script type="module">
    import EmbedPDF from 'https://cdn.jsdelivr.net/npm/@embedpdf/snippet/dist/embedpdf.js';

    const rotateLeftButton = document.getElementById('rotate-left-btn');
    const rotateRightButton = document.getElementById('rotate-right-btn');
    const rotationStatus = document.getElementById('rotation-status');

    const viewer = EmbedPDF.init({
      type: 'container',
      target: document.getElementById('pdf-viewer'),
      theme: { preference: 'system' },
      documentManager: {
        initialDocuments: [
          {
            url: 'https://snippet.embedpdf.com/ebook.pdf',
            documentId: 'ebook',
          },
        ],
      },
    });

    const registry = await viewer.registry;
    const rotate = registry.getPlugin('rotate')?.provides()?.forDocument('ebook');

    if (!rotate) {
      throw new Error('Rotate plugin not available');
    }

    function renderRotation(rotation) {
      rotationStatus.textContent = `Rotation: ${rotation * 90}°`;
    }

    renderRotation(rotate.getRotation());

    rotate.onRotateChange((rotation) => {
      renderRotation(rotation);
    });

    rotateLeftButton.addEventListener('click', () => {
      rotate.rotateBackward();
    });

    rotateRightButton.addEventListener('click', () => {
      rotate.rotateForward();
    });
  </script>
</body>
</html>
