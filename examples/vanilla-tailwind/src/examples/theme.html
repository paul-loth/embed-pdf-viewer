<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>EmbedPDF Theme Example</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="min-h-screen bg-slate-100 p-6 text-slate-900">
  <div class="mx-auto flex max-w-7xl flex-col gap-4">
    <section class="flex flex-col gap-4 rounded-xl border border-slate-200 bg-white p-4 shadow-sm">
      <div class="flex flex-wrap items-center gap-3">
        <span class="text-sm font-medium text-slate-700">Choose brand color:</span>
        <div id="color-buttons" class="flex gap-2"></div>
        <span class="text-sm text-slate-500">
          Selected: <strong id="selected-color-name">Purple</strong>
        </span>
      </div>

      <div class="flex flex-wrap items-center gap-2">
        <span class="text-sm font-medium text-slate-700">Theme mode:</span>
        <div id="theme-buttons" class="flex gap-2"></div>
        <span class="text-sm text-slate-500">
          Active mode: <strong id="selected-theme-mode">system</strong>
        </span>
      </div>
    </section>

    <div class="h-[700px] overflow-hidden rounded-xl border border-slate-300 bg-white shadow-lg">
      <div id="pdf-viewer" class="h-full w-full"></div>
    </div>
  </div>

  <script type="module">
    import EmbedPDF from 'https://cdn.jsdelivr.net/npm/@embedpdf/snippet/dist/embedpdf.js';

    const brandColors = [
      {
        name: 'Purple',
        primary: '#9333ea',
        hover: '#7e22ce',
        active: '#6b21a8',
        light: '#f3e8ff',
        darkLight: '#3b0764',
      },
      {
        name: 'Blue',
        primary: '#2563eb',
        hover: '#1d4ed8',
        active: '#1e40af',
        light: '#dbeafe',
        darkLight: '#1e3a8a',
      },
      {
        name: 'Green',
        primary: '#16a34a',
        hover: '#15803d',
        active: '#166534',
        light: '#dcfce7',
        darkLight: '#14532d',
      },
      {
        name: 'Orange',
        primary: '#ea580c',
        hover: '#c2410c',
        active: '#9a3412',
        light: '#ffedd5',
        darkLight: '#7c2d12',
      },
      {
        name: 'Pink',
        primary: '#db2777',
        hover: '#be185d',
        active: '#9d174d',
        light: '#fce7f3',
        darkLight: '#831843',
      },
    ];

    const themeModes = ['light', 'dark', 'system'];
    let selectedColor = brandColors[0];
    let selectedMode = 'system';

    const selectedColorName = document.getElementById('selected-color-name');
    const selectedThemeMode = document.getElementById('selected-theme-mode');
    const colorButtons = document.getElementById('color-buttons');
    const themeButtons = document.getElementById('theme-buttons');

    function buildTheme(color, mode) {
      return {
        preference: mode,
        light: {
          accent: {
            primary: color.primary,
            primaryHover: color.hover,
            primaryActive: color.active,
            primaryLight: color.light,
            primaryForeground: '#ffffff',
          },
        },
        dark: {
          accent: {
            primary: color.primary,
            primaryHover: color.hover,
            primaryActive: color.active,
            primaryLight: color.darkLight,
            primaryForeground: '#ffffff',
          },
        },
      };
    }

    const viewer = EmbedPDF.init({
      type: 'container',
      target: document.getElementById('pdf-viewer'),
      src: 'https://snippet.embedpdf.com/ebook.pdf',
      theme: buildTheme(selectedColor, selectedMode),
    });

    function applyTheme() {
      viewer.setTheme(buildTheme(selectedColor, selectedMode));
      selectedColorName.textContent = selectedColor.name;
      selectedThemeMode.textContent = selectedMode;
      renderButtons();
    }

    function createColorButton(color) {
      const button = document.createElement('button');
      const isSelected = selectedColor.name === color.name;
      button.type = 'button';
      button.className =
        'h-8 w-8 rounded-full border-2 transition-transform hover:scale-110 ' +
        (isSelected ? 'border-slate-900 ring-2 ring-offset-2' : 'border-transparent');
      button.style.backgroundColor = color.primary;
      button.title = color.name;
      button.addEventListener('click', () => {
        selectedColor = color;
        applyTheme();
      });
      return button;
    }

    function createThemeButton(mode) {
      const button = document.createElement('button');
      const isSelected = selectedMode === mode;
      button.type = 'button';
      button.className =
        'rounded-md border px-3 py-1.5 text-sm font-medium transition-colors ' +
        (isSelected
          ? 'border-slate-900 bg-slate-900 text-white'
          : 'border-slate-300 bg-white text-slate-700 hover:bg-slate-50');
      button.textContent = mode;
      button.addEventListener('click', () => {
        selectedMode = mode;
        applyTheme();
      });
      return button;
    }

    function renderButtons() {
      colorButtons.replaceChildren(...brandColors.map(createColorButton));
      themeButtons.replaceChildren(...themeModes.map(createThemeButton));
    }

    applyTheme();
  </script>
</body>
</html>
